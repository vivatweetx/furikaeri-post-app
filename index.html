  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ===== 🔥 Firebase設定 =====
    const firebaseConfig = {
      apiKey: "AIzaSyAp6pSioFORPjRHxoF57B1QsSIwvKXHUSk",
      authDomain: "furikaeri-post-app.firebaseapp.com",
      projectId: "furikaeri-post-app",
      storageBucket: "furikaeri-post-app.firebasestorage.app",
      messagingSenderId: "452191460927",
      appId: "1:452191460927:web:ee96fe6e45fc91e7b7a28a"
    };

    // ===== 設定ここまで =====

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const DOC_ID = "furikaeri_data";

    // ログイン（リダイレクト方式）
    // ログイン（ポップアップ方式）
    window.fbSignIn = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        return { user: result.user };
      } catch(e) {
        return { error: "ログインに失敗しました: " + e.message };
      }
    };

    // ログアウト
    window.fbSignOut = async () => {
      await signOut(auth);
    };

    // 認証状態の監視
    window.fbOnAuthChange = (callback) => {
      onAuthStateChanged(auth, (user) => {
        callback({ user: user || null });
      });
    };

    // データ読み込み
    window.fbLoad = async () => {
      try {
        const ref = doc(db, "posts", DOC_ID);
        const snap = await getDoc(ref);
        return snap.exists() ? snap.data() : null;
      } catch(e) {
        console.error("Firebase読み込みエラー:", e);
        return null;
      }
    };

    // データ保存
    window.fbSave = async (data) => {
      try {
        const ref = doc(db, "posts", DOC_ID);
        await setDoc(ref, data);
        return true;
      } catch(e) {
        console.error("Firebase保存エラー:", e);
        return false;
      }
    };

    // アプリ初期化イベントを発火
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ===== 記事初期データ =====
    const INITIAL_ARTICLES = [
      { id: 1, type: "TIPS", title: "ふりかえりはルーチンに「組み込む」もの",
        short: "【ふりかえりTIPS】\nふりかえりを「意志の力」で続けようとすると、まず続きません。朝起きたら顔を洗うように、毎日同じ時間・同じ場所でやるのがコツです。通勤電車の5分でも、就業前の15分でもいい。「固定のタイミング」にぶち込んでしまいましょう。\n\nやってみよう：あなたの毎日のルーティンの中で、ふりかえりを差し込めるタイミングはどこですか？",
        x: "ふりかえりを「意志の力」で続けようとすると、まず続きません。朝起きたら顔を洗うように、毎日同じ時間・同じ場所でやるのがコツ。通勤電車の5分でもOK。「いつやるか」を先に決めてしまいましょう #ふりかえり",
        sizu: "**ふりかえりはルーチンに「組み込む」もの**\n\nふりかえりを「意志の力」で続けようとすると、まず続きません。\n\n私自身、毎日通勤電車の中で頭の中でふりかえりをしています。場所も時間も固定。これが一番シンプルで効果的なやり方でした。\n\n朝起きたら顔を洗う。ご飯を食べたら歯を磨く。そういう「考えずにやっているルーティン」の中に、ふりかえりを差し込んでしまうんです。\n\n具体的にはこんなイメージです。\n・毎朝始業後の15分で昨日のふりかえり\n・退勤前の15分でその日をふりかえる\n・通勤電車の5分で頭の中でサッとふりかえる\n・毎週金曜16時から30分、自分のためのふりかえり\n\nどれが合うかは人によって違います。大事なのは「固定のタイミング」をつくること。\n\nやってみよう：あなたの毎日のルーティンの中で、ふりかえりを差し込めるタイミングはどこですか？" },
      { id: 2, type: "手法", title: "YWT（やったこと・わかったこと・つぎやること）",
        short: "今回は手法「YWT」の紹介です！\nY「やったこと」、W「わかったこと」、T「つぎやること」の頭文字をとったふりかえり手法です。経験学習サイクルを回すのにとにかく軽くて使いやすい。KPTで「Problemばかりでしんどい」という経験がある人にこそ試してほしいです。ひとりでも、チームでも使えて、1日分なら5〜15分が目安。\n\nやってみよう：今日1日をYWTでふりかえるとしたら、「わかったこと」に何が書けそうですか？",
        x: "KPTで「Problemばかり出てしんどい」ってなった経験ありませんか？そんな人にはYWT（やったこと・わかったこと・つぎやること）がおすすめ。学びにフォーカスできて、ふりかえりが前向きになります #ふりかえり",
        sizu: "**YWT：学びにフォーカスしたふりかえりの手法**\n\nKPTを使ってみたけど、「Problemばかり出てきてしんどくなった」という経験はありませんか？\n\n私もよく相談を受けます。そういう人に真っ先に紹介するのがYWTです。\n\nYWTは、Y「やったこと」、W「わかったこと」、T「つぎやること」のローマ字の頭文字をとっています。\n\nKPTとYWTの大きな違いは「問いの向き」です。KPTだとProblemが溢れて、ふりかえりが「反省会」になりがちです。\n\nYWTは「やったこと」から入るので、まず自分の行動を肯定的に思い出せる。そして「わかったこと」という広い問いが、学びや気付きを自然に引き出してくれます。\n\nやってみよう：今日1日をYWTでふりかえるとしたら、「わかったこと」に何が書けそうですか？" },
      { id: 3, type: "TIPS", title: "アクションが実行されないのは「意志が弱い」せいじゃない",
        short: "【ふりかえりTIPS】\n「ふりかえりでアクションを決めたのに、やらないまま次のふりかえりになる」。よくある話です。原因のほとんどは「目に入らなくなること」。PCのモニタの端、手帳の表紙、毎日通る壁に貼っておくだけで変わります。強制力じゃなく、自然に動ける仕掛けをつくりましょう。\n\nやってみよう：直近のふりかえりで決めたアクション、今どこにありますか？",
        x: "ふりかえりでアクションを決めたのに実行されない、それ意志の問題じゃないです。「目に入らなくなる」だけ。PCのモニタや手帳の表紙など、毎日目に入る場所に貼っておく。それだけで変わります #ふりかえり",
        sizu: "**アクションが実行されないのは、意志が弱いせいじゃない**\n\n「ふりかえりでアクションを決めたのに、気づいたら次のふりかえりになってた」。この悩み、本当によく聞きます。\n\nそのとき多くの人が「自分の意志が弱い」と思ってしまう。でも、そうじゃないんです。\n\n原因はほとんどの場合「アクションが目に入らなくなること」です。\n\n解決策はシンプルで、「意識せずとも目に入る場所」に置くこと。PCのモニタの端に付箋を貼る。手帳の表紙に書く。毎朝通るデスクの壁に貼り出す。\n\n「やらなければ」という強制力じゃなく、自然に動ける仕掛けをつくる。この発想の転換が大事です。\n\nやってみよう：直近のふりかえりで決めたアクション、今どこにありますか？毎日目に入る場所に置けていますか？" },
      { id: 4, type: "手法", title: "Good & New（グッドアンドニュー）",
        short: "今回は手法「Good & New」の紹介です！\n「よかったこと」と「新しい気付き」の2つをシンプルに共有するふりかえり手法です。アイスブレイクにも場作りにも使えます。どんなに小さなことでもいい。前向きな気持ちで始まったふりかえりは、アイデアが出やすく、相手の話もちゃんと聴けるようになるんです。一人×1分程度でサクッとできます。\n\nやってみよう：今日1つだけ「よかったこと」か「新しい気付き」を思い浮かべてみてください。",
        x: "ふりかえりの前に「よかったこと」「新しい気付き」を一言ずつ共有するだけで、場の雰囲気がガラッと変わります。それがGood & New。「庭のチューリップの芽が出た」でも全然OK。小さいことでいい。 #ふりかえり",
        sizu: "**Good & New：ふりかえりの場を前向きに温める手法**\n\nふりかえりを始めようとしたとき、チームの空気が重かったり、みんなの表情が固かったりすること、ありませんか？\n\nそんなときに使えるのがGood & Newです。\n\n「よかったこと（Good）」と「新しい気付き（New）」の2つを、一人ひとつだけ共有する。それだけです。\n\n小さければ小さいほど、みんなの発言のハードルが下がって、次の人も話しやすくなります。\n\nこの手法のいいところは、前向きな気持ちに切り替えてくれること。ポジティブな状態でふりかえりに入ると、アイデアが出やすくなったり、相手の話をちゃんと聴けるようになったりするんです。\n\nやってみよう：今日1つだけ「よかったこと」か「新しい気付き」を思い浮かべてみてください。何が出てきましたか？" },
      { id: 5, type: "TIPS", title: "感情は「ノイズ」じゃなくて、学びへの入口",
        short: "【ふりかえりTIPS】\n「楽しかった」「なんかモヤっとした」。その感情、スルーしていませんか？感情を1段階だけ掘り下げると、自分が大切にしていることや、気づいていなかった価値観が出てきます。「なぜそう感じたのか」を問うだけで、ふりかえりの深さがぐっと変わります。\n\nやってみよう：今日1番印象に残った感情は何ですか？「なぜそう感じたのか」を少しだけ掘り下げてみてください。",
        x: "「楽しかった」「モヤっとした」という感情、ふりかえりでスルーしてませんか？その感情を1段階だけ掘り下げると、自分が大切にしていることが見えてきます。感情はノイズじゃなくて、学びへの入口です #ふりかえり",
        sizu: "**感情は「ノイズ」じゃなくて、学びへの入口**\n\nふりかえりをしているとき、「楽しかった」「なんかモヤっとした」「ちょっと嬉しかった」という感情が出てくることがあります。それ、スルーしていませんか？\n\n「感情は主観だから」と思って、事実だけをふりかえっている人がいます。でも実は、感情こそが学びへの入口なんです。\n\n感情を1段階だけ掘り下げると、そこに大切なものが隠れています。\n\n「なぜ楽しかったのか？」→「新しいことを試せたから」→「私は挑戦することが好きなんだ」\n「なぜモヤっとしたのか？」→「自分の意見が通らなかったから」→「意見を尊重されることを大切にしているんだ」\n\nやってみよう：今日1番印象に残った感情は何ですか？「なぜそう感じたのか」を少しだけ掘り下げてみてください。" },
      { id: 6, type: "手法", title: "+/Δ（プラス/デルタ）",
        short: "今回は手法「+/Δ（プラス/デルタ）」の紹介です！\nふりかえりそのものをふりかえる手法です。「今日のふりかえり、よかったところ（＋）」と「改善したいところ（Δ）」を5分だけ話し合います。これを繰り返すと、ふりかえりが少しずつよくなっていきます。ふりかえりのカイゼンも、ふりかえりでやればいい。\n\nやってみよう：直近のふりかえり、よかったところと「次はこうしたい」と思ったところはそれぞれ何ですか？",
        x: "ふりかえりをよくするにはどうすればいい？→ふりかえりのふりかえりをすればいい。それが+/Δ（プラス/デルタ）。「よかったところ」と「改善したいところ」を5分話すだけ。シンプルだけど効く #ふりかえり",
        sizu: "**+/Δ：ふりかえりをカイゼンするための、ふりかえり**\n\n「ふりかえりをよくするにはどうすればいいですか？」という質問をよく受けます。\n\n答えはシンプルで、ふりかえりそのものをふりかえればいいんです。それが+/Δ（プラス/デルタ）という手法です。\n\n「今日のふりかえり、よかったところ（＋）」と「改善したいところ（Δ）」を、5分だけ話し合います。ホワイトボードを二分割して、意見のある人からどんどん言っていくだけ。\n\nこの手法のポイントは「テンポよく続けること」です。毎回やる必要はありません。4〜8回に1回くらい+/Δの時間をとるだけでいい。\n\nやってみよう：直近のふりかえり、よかったところと「次はこうしたい」と思ったところはそれぞれ何ですか？" },
      { id: 7, type: "TIPS", title: "「毎日同じレベルで書ききろう」としなくていい",
        short: "【ふりかえりTIPS】\n毎日ふりかえりを続けていると、「今日は全然書けなかった」という日が出てきます。それ、全然OKです。大事なのはレベルを保つことじゃなくて、続けること。適当に書く日があっても、ちょっとだけの日があっても、それで十分。\n\nやってみよう：続けられている今日の自分を、ちゃんと認めてあげてください。",
        x: "「今日は全然書けなかった」という日があっても、全然OK。大事なのはレベルを保つことじゃなくて、続けること。ちょっとだけの日があっていい。「全部やりきらなければ」という呪縛、そろそろ手放しましょう #ふりかえり",
        sizu: "**「毎日同じレベルで書ききろう」としなくていい**\n\n毎日ふりかえりを続けていると、必ず「今日は全然書けなかった」「なんか適当になってしまった」という日が出てきます。\n\nそれ、全然OKです。\n\n大事なのは、毎回完璧に書くことじゃなくて、続けること。\n\nちょっとだけ書いてもいい。箇条書き1行でもいい。「今日は疲れた」の1文でもいい。ゼロよりずっといいんです。\n\n無理しないことが、長く続ける一番のコツだと思っています。適当な日を責めるのではなく、「今日も続けた」という事実を、ちゃんと認めてあげてください。\n\nやってみよう：最近のふりかえりで「適当になった」と感じた日はありましたか？それでも続けられている自分を、ちゃんと認めてあげてください。" },
    ];

    const ARTICLE_TEMPLATES = [
      { type: "TIPS", topics: ["ふりかえりの問いを深める方法", "チームのふりかえりをもっと楽しくする工夫", "1週間ふりかえりのやり方", "ふりかえりで自己承認する大切さ", "ふりかえりを公表することの効果", "ふりかえりの記録を振り返る習慣", "感謝をふりかえりに取り入れる方法"] },
      { type: "手法", topics: ["KPT（Keep・Problem・Try）", "Fun/Done/Learn", "学習マトリックス", "Celebration Grid", "Timeline（タイムライン）", "ORID", "4Ls（Liked/Lacked/Learned/Longed for）"] },
    ];

    const TAB_LABELS = ["📝 ふりかえり部", "𝕏 X投稿", "📖 sizu", "🏢 シフトバ", "💬 いちゃ部屋"];
    const TAB_KEYS = ["short", "x", "sizu", "shifutoba", "ichaya"];

    const SPLIT_TABS = ["sizu", "shifutoba", "ichaya"];

    function extractSizuTitle(text) {
      const m = text.match(/^\*\*(.+?)\*\*/);
      return m ? m[1] : "";
    }
    function extractSizuBody(text) {
      return text.replace(/^\*\*.+?\*\*\n\n?/, "");
    }
    function toIchayaFormat(text) {
      return text.replace(/^\*\*(.+?)\*\*/, "■$1");
    }

    // ===== 日本の祝日 =====
    const JP_HOLIDAYS = new Set([
      // 2025年
      "2025-01-01","2025-01-13","2025-02-11","2025-02-23","2025-02-24",
      "2025-03-20","2025-04-29","2025-05-03","2025-05-04","2025-05-05","2025-05-06",
      "2025-07-21","2025-08-11","2025-09-15","2025-09-23","2025-10-13",
      "2025-11-03","2025-11-23","2025-11-24",
      // 2026年
      "2026-01-01","2026-01-12","2026-02-11","2026-02-23","2026-03-20",
      "2026-04-29","2026-05-03","2026-05-04","2026-05-05","2026-05-06",
      "2026-07-20","2026-08-11","2026-09-21","2026-09-22","2026-09-23","2026-10-12",
      "2026-11-03","2026-11-23",
      // 2027年
      "2027-01-01","2027-01-11","2027-02-11","2027-02-23","2027-03-21",
      "2027-04-29","2027-05-03","2027-05-04","2027-05-05",
      "2027-07-19","2027-08-11","2027-09-20","2027-09-23","2027-10-11",
      "2027-11-03","2027-11-23",
    ]);

    function isHoliday(date) {
      const dow = date.getDay();
      if (dow === 0 || dow === 6) return true; // 日・土
      const str = date.toISOString().split("T")[0];
      return JP_HOLIDAYS.has(str);
    }

    // dayIndex番目（0始まり）の平日日付を返す
    function dateFromDayIndex(startDate, dayIndex) {
      if (!startDate) return null;
      const d = new Date(startDate);
      d.setHours(0,0,0,0);
      let count = 0;
      while (count < dayIndex) {
        d.setDate(d.getDate() + 1);
        if (!isHoliday(d)) count++;
      }
      return d.toISOString().split("T")[0];
    }

    // 今日が何番目の平日か（startDateから数えて）
    function getTodayDayIndex(startDate) {
      if (!startDate) return null;
      const start = new Date(startDate);
      const today = new Date();
      start.setHours(0,0,0,0); today.setHours(0,0,0,0);
      if (today < start) return -1;
      let count = 0;
      const d = new Date(start);
      while (d < today) {
        d.setDate(d.getDate() + 1);
        if (!isHoliday(d)) count++;
      }
      // todayがstartと同じ日（Day 0）
      if (today.getTime() === start.getTime()) return 0;
      return count;
    }

    // 日付文字列→dayIndex（平日カウント）
    function dateStrToDayIndex(startDate, dateStr) {
      if (!startDate) return null;
      const start = new Date(startDate);
      const target = new Date(dateStr);
      start.setHours(0,0,0,0); target.setHours(0,0,0,0);
      if (target < start) return null;
      if (isHoliday(target)) return null; // 土日祝は記事なし
      let count = 0;
      const d = new Date(start);
      while (d < target) {
        d.setDate(d.getDate() + 1);
        if (!isHoliday(d)) count++;
      }
      return count;
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand("copy");
        document.body.removeChild(ta);
      });
    }

    // ===== SplitCopyPanel =====
    function SplitCopyPanel({ article, tabKey }) {
      const [copiedTitle, setCopiedTitle] = React.useState(false);
      const [copiedBody, setCopiedBody] = React.useState(false);
      const base = tabKey === "ichaya" ? toIchayaFormat(article.sizu) : article.sizu;
      const rawTitle = extractSizuTitle(article.sizu);
      const titleFormatted = tabKey === "ichaya" ? "■" + rawTitle : rawTitle;
      const bodyText = extractSizuBody(base);
      // いちゃ部屋は本文のみ
      if (tabKey === "ichaya") {
        return (
          <div className="space-y-3">
            <div className="bg-stone-50 rounded-lg px-4 py-3">
              <div className="flex items-center justify-between mb-1">
                <span className="text-xs font-bold text-stone-500">本文</span>
                <button onClick={() => { copyToClipboard(bodyText); setCopiedBody(true); setTimeout(()=>setCopiedBody(false),2000); }}
                  className="text-xs bg-stone-700 hover:bg-stone-500 text-white px-3 py-1 rounded-full transition-colors">
                  {copiedBody ? "コピーしました ✓" : "コピー"}

    // ===== Calendar =====
    function CalendarView({ startDate, articles, releaseStatus, onSelectDay }) {
      const today = new Date();
      const [calYear, setCalYear] = React.useState(today.getFullYear());
      const [calMonth, setCalMonth] = React.useState(today.getMonth());
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const firstDow = new Date(calYear, calMonth, 1).getDay();
      const todayStr = today.toISOString().split("T")[0];

      function getDayIndex(dateStr) {
        if (!startDate) return null;
        const idx = dateStrToDayIndex(startDate, dateStr);
        if (idx === null) return null;
        return idx < articles.length ? idx : null;
      }

      function getReleaseLevel(dayIndex) {
        if (dayIndex === null) return 0;
        const rs = releaseStatus[dayIndex];
        if (!rs) return 0;
        const count = TAB_KEYS.filter(k => rs[k]).length;
        if (count === 0) return 0;
        if (count <= 2) return 1;
        if (count <= 4) return 2;
        return 3;
      }

      const cells = [];
      for (let i = 0; i < firstDow; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      return (
        <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
          <div className="flex items-center justify-between px-5 py-3 border-b border-stone-100">
            <button onClick={() => { if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); }} className="text-stone-400 hover:text-stone-700 px-2 py-1 rounded text-lg">‹</button>
            <span className="text-sm font-bold text-stone-700">{calYear}年 {calMonth+1}月</span>
            <button onClick={() => { if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); }} className="text-stone-400 hover:text-stone-700 px-2 py-1 rounded text-lg">›</button>
          </div>
          <div className="grid grid-cols-7 text-center">
            {["日","月","火","水","木","金","土"].map((d,i) => (
              <div key={i} className={`text-xs py-2 font-bold ${i===0?"text-red-400":i===6?"text-blue-400":"text-stone-400"}`}>{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7">
            {cells.map((day, i) => {
              if (!day) return <div key={i} />;
              const dateStr = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const dayIndex = getDayIndex(dateStr);
              const level = getReleaseLevel(dayIndex);
              const isToday = dateStr === todayStr;
              const hasArticle = dayIndex !== null;
              const dateObj = new Date(dateStr);
              const isWeekendOrHoliday = isHoliday(dateObj);
              const bg = level===3?"bg-emerald-500 text-white":level===2?"bg-emerald-200 text-emerald-900":level===1?"bg-amber-200 text-amber-900":hasArticle?"bg-stone-100 hover:bg-stone-200":"";
              const textColor = !hasArticle ? (isWeekendOrHoliday ? "text-stone-200" : "text-stone-300") : "";
              return (
                <div key={i} className="p-1 flex justify-center items-center">
                  <button onClick={() => hasArticle && onSelectDay(dayIndex)} disabled={!hasArticle}
                    className={`w-8 h-8 rounded-full text-xs font-bold transition-colors ${bg} ${isToday?"ring-2 ring-amber-500 ring-offset-1":""} ${textColor}`}>
                    {day}
                  </button>
                </div>
              );
            })}
          </div>
          <div className="flex items-center gap-3 px-5 py-3 border-t border-stone-100 flex-wrap">
            {[{color:"bg-stone-200",label:"記事あり"},{color:"bg-amber-200",label:"1媒体"},{color:"bg-emerald-200",label:"2媒体"},{color:"bg-emerald-500",label:"全媒体完了"}].map(({color,label}) => (
              <div key={label} className="flex items-center gap-1"><span className={`w-3 h-3 rounded-full ${color}`}/><span className="text-xs text-stone-500">{label}</span></div>
            ))}
          </div>
        </div>
      );
    }

              </div>
            </div>
            <div className="flex border-b border-stone-200 px-2 gap-0 overflow-x-auto">
              {TAB_LABELS.map((label,i) => (
                <button key={i} onClick={() => setActiveTab(i)} className={`text-xs py-3 px-2 border-b-2 transition-colors flex items-center gap-1 whitespace-nowrap shrink-0 ${activeTab===i?"border-amber-500 text-amber-700 font-bold":"border-transparent text-stone-400 hover:text-stone-600"}`}>
                  {label}{releaseStatus?.[TAB_KEYS[i]]&&<span className="text-emerald-500">✓</span>}
                </button>
              ))}
            </div>
            <div className="px-6 py-5">
              {isSplitTab ? (
                <SplitCopyPanel article={article} tabKey={tabKey} />
              ) : (
                <pre className="text-sm text-stone-700 whitespace-pre-wrap leading-relaxed">{tabContent}</pre>
              )}
              <div className="flex items-center justify-between mt-4">
                <button onClick={() => onToggleRelease(dayIndex,tabKey)} className={`text-xs px-3 py-1.5 rounded-full border transition-colors ${releaseStatus?.[tabKey]?"bg-emerald-100 text-emerald-700 border-emerald-300":"bg-white text-stone-500 border-stone-300 hover:border-stone-500"}`}>
                  {releaseStatus?.[tabKey]?"✓ リリース済み":"リリース済みにする"}
                </button>
                {!isSplitTab && (
                  <button onClick={() => {copyToClipboard(tabContent);setCopied(true);setTimeout(()=>setCopied(false),2000);}} className="text-xs bg-stone-800 hover:bg-stone-600 text-white px-4 py-1.5 rounded-full">
                    {copied?"コピーしました ✓":"コピー"}
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ===== ログイン画面 =====
    function LoginScreen({ onLogin, error, loading }) {
      return (
        <div className="min-h-screen bg-stone-50 flex items-center justify-center px-4">
          <div className="bg-white rounded-2xl border border-stone-200 shadow-lg px-8 py-10 w-full max-w-sm text-center">
            <p className="text-xs font-bold text-stone-400 tracking-wider mb-1">@viva_tweet_x</p>
            <h1 className="text-xl font-black text-stone-800 mb-2">ふりかえり投稿管理</h1>
            <p className="text-sm text-stone-500 mb-8">Googleアカウントでログインしてください</p>
            <button onClick={onLogin} disabled={loading}
              className="w-full flex items-center justify-center gap-3 bg-white border-2 border-stone-200 hover:border-stone-400 text-stone-700 font-bold py-3 px-6 rounded-xl transition-colors disabled:opacity-50">
              <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              </svg>
              {loading ? "ログイン中..." : "Googleでログイン"}
            </button>
            {error && (
              <p className="mt-4 text-sm text-red-500 bg-red-50 rounded-lg px-4 py-2">{error}</p>
            )}
          </div>
        </div>
      );
    }

    // ===== メインアプリ =====
    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [loginLoading, setLoginLoading] = useState(false);
      const [loginError, setLoginError] = useState("");
      const [startDate, setStartDate] = useState(null);
      const [articles, setArticles] = useState(INITIAL_ARTICLES);
      const [releaseStatus, setReleaseStatus] = useState({});
      const [view, setView] = useState("today");
      const [editTarget, setEditTarget] = useState(null);
      const [regenTarget, setRegenTarget] = useState(null);
      const [showGenerateMore, setShowGenerateMore] = useState(false);
      const [calendarSelectDay, setCalendarSelectDay] = useState(null);
      const [dateInput, setDateInput] = useState("");
      const [loaded, setLoaded] = useState(false);
      const [syncStatus, setSyncStatus] = useState("idle");

      // 認証状態の監視
      useEffect(() => {
        const setup = () => {
          window.fbOnAuthChange(({ user }) => {
            setUser(user);
            setAuthLoading(false);
          });
        };
        if (window.fbOnAuthChange) setup();
        else window.addEventListener("firebase-ready", setup);
        return () => window.removeEventListener("firebase-ready", setup);
      }, []);

      // ログイン処理
      const handleLogin = async () => {
        setLoginLoading(true);
        setLoginError("");
        const result = await window.fbSignIn();
        if (result.error) {
          setLoginError(result.error);
          setLoginLoading(false);
        }
      };

      // ログアウト処理
      const handleLogout = async () => {
        await window.fbSignOut();
        setUser(null);
        setLoaded(false);
      };

      // Firebase経由でロード（ログイン後）
      useEffect(() => {
        if (!user) return;
        const init = async () => {
          if (window.fbLoad) {
            const data = await window.fbLoad();
            if (data) {
              if (data.startDate) setStartDate(data.startDate);
              if (data.articles) setArticles(data.articles);
              if (data.releaseStatus) setReleaseStatus(data.releaseStatus);
            }
          }
          setLoaded(true);
        };
        init();
      }, [user]);

      const saveToFirebase = useCallback(async (newArticles, newStartDate, newReleaseStatus) => {
        setSyncStatus("saving");
        const payload = {
          startDate: newStartDate !== undefined ? newStartDate : startDate,
          articles: newArticles !== undefined ? newArticles : articles,
          releaseStatus: newReleaseStatus !== undefined ? newReleaseStatus : releaseStatus,
          updatedAt: new Date().toISOString(),
        };
        const ok = await window.fbSave(payload);
        setSyncStatus(ok ? "saved" : "error");
        setTimeout(() => setSyncStatus("idle"), 3000);
      }, [startDate, articles, releaseStatus]);

      const todayIndex = getTodayDayIndex(startDate);

      const handleSetDate = () => {
        if (!dateInput) return;
        setStartDate(dateInput);
        saveToFirebase(undefined, dateInput, undefined);
      };

      const handleEditSave = (updated) => {
        const next = articles.map(a => a.id===updated.id ? updated : a);
        setArticles(next); saveToFirebase(next, undefined, undefined);
        setEditTarget(null); setCalendarSelectDay(null);
      };

      const handleRegenSave = (updated) => {
        const next = articles.map(a => a.id===updated.id ? updated : a);
        setArticles(next); saveToFirebase(next, undefined, undefined);
        setRegenTarget(null);
      };

      const handleToggleRelease = (dayIndex, tabKey) => {
        const next = { ...releaseStatus, [dayIndex]: { ...(releaseStatus[dayIndex]||{}), [tabKey]: !(releaseStatus[dayIndex]?.[tabKey]) } };
        setReleaseStatus(next); saveToFirebase(undefined, undefined, next);
      };

      const handleGenerateMore = (newArticles) => {
        const next = [...articles, ...newArticles];
        setArticles(next); saveToFirebase(next, undefined, undefined);
        setShowGenerateMore(false);
      };

      const filteredArticles = articles.filter((_,i) => {
        if (view==="today") return i===todayIndex;
        if (view==="upcoming") return todayIndex!==null && i>todayIndex;
        if (view==="released") return todayIndex!==null && i<todayIndex;
        return true;
      });

      const syncBadge = syncStatus==="saving" ? "⟳ 同期中..." : syncStatus==="saved" ? "☁ 保存しました" : syncStatus==="error" ? "⚠ 保存失敗" : null;
      const syncColor = syncStatus==="error" ? "text-red-500" : "text-emerald-600";

      // 認証チェック中
      if (authLoading) return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <p style={{color:"#a8a29e",fontSize:"14px"}}>認証確認中...</p>
        </div>
      );

      // 未ログイン
      if (!user) return (
        <LoginScreen onLogin={handleLogin} error={loginError} loading={loginLoading} />
      );

      // データ読み込み中
      if (!loaded) return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <p style={{color:"#a8a29e",fontSize:"14px"}}>読み込み中...</p>
        </div>
      );

      return (
        <div className="min-h-screen bg-stone-50">
          <header className="bg-white border-b border-stone-200 sticky top-0 z-40">
            <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
              <div>
                <p className="text-xs text-stone-400 font-bold tracking-wider">@viva_tweet_x</p>
                <h1 className="text-base font-black text-stone-800 leading-tight">ふりかえり投稿管理</h1>
              </div>
              <div className="flex items-center gap-3">
                {syncBadge && <span className={`text-xs font-bold ${syncColor}`}>{syncBadge}</span>}
                <button onClick={() => setShowGenerateMore(true)} className="text-xs bg-amber-500 hover:bg-amber-400 text-white font-bold px-3 py-1.5 rounded-full transition-colors">+ 記事を追加</button>
                <button onClick={handleLogout} title="ログアウト" className="text-xs text-stone-400 hover:text-stone-700 border border-stone-200 hover:border-stone-400 px-2 py-1.5 rounded-lg transition-colors">
                  ログアウト
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-4 py-6 space-y-5">
            <div className="bg-white border border-stone-200 rounded-xl px-5 py-4">
              <p className="text-xs font-bold text-stone-500 mb-2">開始日（Day 1のリリース日）</p>
              <div className="flex items-center gap-2 flex-wrap">
                <input type="date" value={dateInput || startDate || ""} onChange={e=>setDateInput(e.target.value)} className="text-sm border border-stone-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-amber-400" />
                <button onClick={handleSetDate} className="text-sm bg-stone-800 hover:bg-stone-600 text-white px-4 py-1.5 rounded-full transition-colors">設定</button>
                {startDate && <span className="text-xs text-stone-400">{startDate} 開始 · 今日は Day {todayIndex!==null&&todayIndex>=0?todayIndex+1:"—"} · 全{articles.length}日分</span>}
              </div>
            </div>

            {startDate && <CalendarView startDate={startDate} articles={articles} releaseStatus={releaseStatus} onSelectDay={setCalendarSelectDay} />}

            <div className="flex gap-1 bg-stone-100 p-1 rounded-xl">
              {[{key:"today",label:"今日の記事"},{key:"upcoming",label:"今後の予定"},{key:"released",label:"リリース済み"},{key:"all",label:"すべて"}].map(({key,label}) => (
                <button key={key} onClick={() => setView(key)} className={`flex-1 text-xs font-bold py-2 px-1 rounded-lg transition-colors ${view===key?"bg-white text-stone-800 shadow-sm":"text-stone-500 hover:text-stone-700"}`}>{label}</button>
              ))}
            </div>

            {!startDate && view!=="all" ? (
              <div className="text-center py-12 text-stone-400 text-sm">開始日を設定すると各タブが有効になります</div>
            ) : filteredArticles.length===0 ? (
              <div className="text-center py-12 space-y-3">
                <p className="text-stone-400 text-sm">{view==="today"&&"今日対応する記事はありません"}{view==="upcoming"&&"今後の記事がありません"}{view==="released"&&"まだリリース済みの記事はありません"}</p>
                {view==="upcoming" && <button onClick={() => setShowGenerateMore(true)} className="text-sm bg-amber-500 hover:bg-amber-400 text-white font-bold px-5 py-2 rounded-full">AIで記事を追加生成する</button>}
              </div>
            ) : (
              <div className="space-y-4">
                {filteredArticles.map(article => {
                  const dayIndex = articles.findIndex(a=>a.id===article.id);
                  return <ArticleCard key={article.id} article={article} dayIndex={dayIndex} isToday={dayIndex===todayIndex} startDate={startDate} releaseStatus={releaseStatus[dayIndex]||{}} onToggleRelease={handleToggleRelease} onEdit={setEditTarget} onRegenerate={setRegenTarget} />;
                })}
              </div>
            )}
          </main>

          {editTarget && <EditModal article={editTarget} onSave={handleEditSave} onClose={() => setEditTarget(null)} />}
          {regenTarget && <RegenModal article={regenTarget} onRegenerate={handleRegenSave} onClose={() => setRegenTarget(null)} />}
          {showGenerateMore && <GenerateMoreModal currentCount={articles.length} onGenerate={handleGenerateMore} onClose={() => setShowGenerateMore(false)} />}
          {calendarSelectDay!==null && articles[calendarSelectDay] && (
            <DayDetailModal article={articles[calendarSelectDay]} dayIndex={calendarSelectDay} startDate={startDate} releaseStatus={releaseStatus[calendarSelectDay]||{}} onToggleRelease={handleToggleRelease} onEdit={a=>{setCalendarSelectDay(null);setEditTarget(a);}} onClose={() => setCalendarSelectDay(null)} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
